# 默认页面配置（请勿直接修改）。
# 建议复制到 config/user/pages/projects.yml 并按需调整。
title: 项目 # 页面标题
subtitle: 项目展示 # 页面副标题

# 指定使用的模板文件名，现有页面模板可见 templates/pages（不含 .hbs）
template: projects

# 页面分类与站点列表
#
# projects 模板采用“代码仓库风”卡片（repo 风格）。
# 统计信息（language/stars/forks）为自动获取数据：
# - 运行 `npm run sync-projects` 会联网抓取 GitHub 仓库信息，并写入 dev/ 缓存（仓库默认 gitignore）
# - `npm run build` 默认不联网；缓存缺失时卡片仅展示标题与描述
categories:
  - name: 个人项目
    icon: fas fa-code # 分类图标（Font Awesome）
    sites:
      - name: Ruying-suixing.github.io
        icon: fab fa-github # 手动图标（manual 模式显示；favicon 模式下作为回退）
        description: # 站点描述
        url: https://github.com/ruying-suixing/ruying-suixing.github.io
      - name: tool
        icon: fab fa-github
        description:
        url: https://github.com/ruying-suixing/tool
      - name: code
        icon: fab fa-github
        description:
        url: https://github.com/ruying-suixing/code
      - name: hello-world
        icon: fab fa-github
        description:
        url: https://github.com/ruying-suixing/hello-world
      - name: docs
        icon: fab fa-github
        description:
        url: https://github.com/ruying-suixing/docs
      - name: home
        icon: fab fa-github
        description:
        url: https://github.com/ruying-suixing/home
  - name: star
    icon: fas fa-star
    sites:
      - name: FastGithub
        icon: fab fa-github
        description:
        url: https://github.com/creazyboyone/FastGithub
      - name: FreeDomain
        icon: fab fa-github
        description:
        url: https://github.com/DigitalPlatDev/FreeDomain
      - name: agency-agents
        icon: fab fa-github
        description:
        url: https://github.com/msitarzewski/agency-agents
